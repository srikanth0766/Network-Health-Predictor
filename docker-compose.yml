version: '3.8'

services:
  db:
    image: postgres:15
    container_name: netwatch_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: netwatch_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/postgres
      - JWT_SECRET=netwatch-dev-secret
    ports:
      - "8000:8000"
    volumes:
      - ./ml:/app/ml
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: netwatch_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
